name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify production index uses built assets
        run: |
          test -f dist/index.html
          grep -q '/anish-shalini-wedding-2026/assets/' dist/index.html
          ! grep -q '/src/main.jsx' dist/index.html
          test -f dist/.nojekyll

      # Publish the Vite dist folder to the gh-pages branch.
      # GitHub's "Deploy from a branch" was publishing the raw main source
      # (index.html → /src/main.jsx), which causes a blank page.
      - name: Deploy dist to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
          enable_jekyll: false

      # Point Pages at gh-pages so visitors get the built site, not main source.
      - name: Set Pages source to gh-pages branch
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const { owner, repo } = context.repo
            const body = {
              build_type: 'legacy',
              source: { branch: 'gh-pages', path: '/' },
            }
            try {
              await github.request('PUT /repos/{owner}/{repo}/pages', {
                owner,
                repo,
                ...body,
                headers: { 'X-GitHub-Api-Version': '2022-11-28' },
              })
              console.log('Updated Pages source to gh-pages /')
            } catch (error) {
              if (error.status === 404) {
                await github.request('POST /repos/{owner}/{repo}/pages', {
                  owner,
                  repo,
                  ...body,
                  headers: { 'X-GitHub-Api-Version': '2022-11-28' },
                })
                console.log('Created Pages site on gh-pages /')
              } else {
                console.warn(
                  'Could not auto-update Pages settings (' +
                    error.status +
                    '). In Settings → Pages, set Branch to gh-pages / (root).',
                )
              }
            }
