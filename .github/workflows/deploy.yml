name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify production build
        run: |
          test -f dist/index.html
          grep -q 'src="/assets/' dist/index.html
          grep -q 'href="/assets/' dist/index.html
          ! grep -q '/anish-shalini-wedding-2026/' dist/index.html
          ! grep -q '/src/main.jsx' dist/index.html
          test -f dist/.nojekyll
          test -f dist/CNAME

      # GitHub Pages is configured as "Deploy from a branch" on main/(root),
      # served from the custom domain anishwedshalini.in at "/".
      # Sync the Vite dist into main root so the branch deploy serves the real
      # build, while keeping source files (src/, index.vite.html, etc.).
      - name: Publish dist onto main for Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: main
          clean: false
          force: false
          commit-message: 'Deploy production build for GitHub Pages [skip ci]'
